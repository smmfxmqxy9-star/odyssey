<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>我的奥德赛时期</title>
<style>
:root {
  --bg-deep: #0a0d14;
  --bg-card: #111827;
  --bg-card-hover: #1a2235;
  --text-primary: #e8ecf2;
  --text-secondary: #8a96a8;
  --text-muted: #4a5568;
  --accent: #6b8cce;
  --accent-glow: rgba(107,140,206,0.35);
  --border: rgba(107,140,206,0.18);
  --star-color: rgba(255,255,255,0.85);
  --gold: #c9a96e;
  --day-hue: 210;
  --font-main: 'PingFang SC', 'Hiragino Sans GB', 'Microsoft YaHei', sans-serif;
  --transition: 0.4s cubic-bezier(0.4, 0, 0.2, 1);
  --page-shadow: 0 20px 60px rgba(0,0,0,0.7), 0 0 80px rgba(107,140,206,0.08);
}

* { margin: 0; padding: 0; box-sizing: border-box; }

body {
  font-family: var(--font-main);
  background: var(--bg-deep);
  color: var(--text-primary);
  overflow: hidden;
  height: 100vh;
  user-select: none;
}

#star-canvas {
  position: fixed;
  inset: 0;
  z-index: 0;
  pointer-events: none;
}

#cover {
  position: fixed;
  inset: 0;
  z-index: 1000;
  background: var(--bg-deep);
  display: flex;
  align-items: center;
  justify-content: center;
  flex-direction: column;
  transition: opacity 1.5s ease, visibility 1.5s ease;
}
#cover.fade-out { opacity: 0; visibility: hidden; }

.cover-title {
  font-size: clamp(2rem, 6vw, 3.5rem);
  font-weight: 300;
  letter-spacing: 0.3em;
  color: var(--text-primary);
  opacity: 0;
  animation: fadeUp 1.2s 0.5s forwards;
}
.cover-subtitle {
  font-size: clamp(0.75rem, 2vw, 1rem);
  letter-spacing: 0.5em;
  color: var(--text-secondary);
  margin-top: 1rem;
  opacity: 0;
  animation: fadeUp 1.2s 1s forwards;
}
.cover-waves {
  position: absolute;
  bottom: 0;
  left: 0;
  width: 100%;
  height: 200px;
  overflow: hidden;
  opacity: 0;
  animation: fadeIn 2s 1.5s forwards;
}
.cover-waves svg { width: 100%; height: 100%; }

.cover-enter {
  margin-top: 3rem;
  padding: 0.7em 2.5em;
  border: 1px solid var(--border);
  background: transparent;
  color: var(--accent);
  font-family: var(--font-main);
  font-size: 0.9rem;
  letter-spacing: 0.3em;
  cursor: pointer;
  opacity: 0;
  animation: fadeUp 1s 2s forwards;
  transition: var(--transition);
}
.cover-enter:hover {
  background: rgba(107,140,206,0.1);
  box-shadow: 0 0 30px var(--accent-glow);
}

@keyframes fadeUp {
  from { opacity: 0; transform: translateY(20px); }
  to { opacity: 1; transform: translateY(0); }
}
@keyframes fadeIn {
  from { opacity: 0; }
  to { opacity: 1; }
}

/* ==================== TOP BAR ==================== */
#topbar {
  position: fixed;
  top: 0;
  left: 0;
  right: 0;
  z-index: 100;
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 0 2rem;
  height: 56px;
  background: linear-gradient(to bottom, var(--bg-deep) 60%, transparent);
  opacity: 0;
  transition: opacity 0.6s;
}
#topbar.visible { opacity: 1; }

#progress-bar {
  display: flex;
  align-items: center;
  gap: 0.8rem;
  font-size: 0.8rem;
  color: var(--text-secondary);
  letter-spacing: 0.1em;
}
#progress-dots { display: flex; gap: 6px; }
.pdot {
  width: 6px; height: 6px;
  border-radius: 50%;
  background: var(--border);
  transition: 0.3s;
}
.pdot.active { background: var(--accent); box-shadow: 0 0 8px var(--accent-glow); }
.pdot.done { background: rgba(107,140,206,0.4); }

.top-btn {
  background: none;
  border: none;
  color: var(--text-secondary);
  font-size: 1.1rem;
  cursor: pointer;
  padding: 0.5rem;
  border-radius: 8px;
  transition: var(--transition);
}
.top-btn:hover { color: var(--accent); background: rgba(107,140,206,0.1); }

/* ==================== BOOK CONTAINER ==================== */
#book {
  position: relative;
  width: 100%;
  height: 100vh;
  perspective: 2000px;
}

.page {
  position: absolute;
  inset: 0;
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 80px 40px 40px;
}

.page-inner {
  width: 100%;
  max-width: 680px;
  max-height: calc(100vh - 120px);
  overflow-y: auto;
  padding: 3rem 3.5rem;
  background: rgba(17, 24, 39, 0.85);
  border: 1px solid var(--border);
  border-radius: 16px;
  backdrop-filter: blur(20px);
  box-shadow: var(--page-shadow);
  scrollbar-width: thin;
  scrollbar-color: var(--border) transparent;
}
.page-inner::-webkit-scrollbar { width: 4px; }
.page-inner::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }

/* ==================== PAGE TRANSITIONS ==================== */
.page-enter { animation: pageEnter 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }
.page-exit { animation: pageExit 0.6s cubic-bezier(0.4, 0, 0.2, 1) forwards; }

@keyframes pageEnter {
  from { opacity: 0; transform: translateX(60px) scale(0.97); }
  to { opacity: 1; transform: translateX(0) scale(1); }
}
@keyframes pageExit {
  from { opacity: 1; transform: translateX(0) scale(1); }
  to { opacity: 0; transform: translateX(-60px) scale(0.97); }
}

/* ==================== TYPOGRAPHY ==================== */
.entry-date {
  font-size: 0.75rem;
  letter-spacing: 0.25em;
  color: var(--text-muted);
  margin-bottom: 0.5rem;
  text-transform: uppercase;
}
.entry-title {
  font-size: 1.5rem;
  font-weight: 300;
  letter-spacing: 0.1em;
  color: var(--text-primary);
  margin-bottom: 2rem;
  padding-bottom: 1.5rem;
  border-bottom: 1px solid var(--border);
}
.entry-section-label {
  font-size: 0.7rem;
  letter-spacing: 0.3em;
  color: var(--accent);
  margin-top: 2.5rem;
  margin-bottom: 0.8rem;
  display: flex;
  align-items: center;
  gap: 0.5rem;
}
.entry-section-label::before {
  content: '✦';
  font-size: 0.6rem;
}
.entry-body {
  font-size: 0.95rem;
  line-height: 2;
  color: var(--text-secondary);
  margin-bottom: 0.8rem;
}
.entry-body:first-of-type { color: var(--text-primary); }
.entry-quote {
  font-size: 0.95rem;
  line-height: 2;
  color: var(--text-secondary);
  font-style: italic;
  text-align: center;
  padding: 1.5rem 2rem;
  margin-top: 1rem;
  border-left: 2px solid var(--accent);
  background: rgba(107,140,206,0.05);
  border-radius: 0 8px 8px 0;
}
.entry-divider {
  text-align: center;
  color: var(--text-muted);
  font-size: 0.8rem;
  letter-spacing: 0.5em;
  margin: 2.5rem 0;
  opacity: 0.5;
}

/* Insight cards */
.insight-card {
  margin-top: 2rem;
  padding: 1.5rem;
  background: rgba(107,140,206,0.04);
  border: 1px solid var(--border);
  border-radius: 12px;
}
.insight-meta {
  font-size: 0.7rem;
  letter-spacing: 0.15em;
  color: var(--text-muted);
  margin-bottom: 0.8rem;
}
.insight-quote {
  font-size: 1rem;
  font-weight: 500;
  color: var(--text-primary);
  margin-bottom: 1rem;
  line-height: 1.7;
}
.insight-text {
  font-size: 0.85rem;
  line-height: 1.9;
  color: var(--text-secondary);
  white-space: pre-line;
}

/* ==================== FLOATING CARDS WALL ==================== */
#cards-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(10, 13, 20, 0.95);
  backdrop-filter: blur(20px);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
  overflow-y: auto;
}
#cards-overlay.open { display: flex; }

.cards-wall {
  width: 100%;
  max-width: 900px;
  display: grid;
  grid-template-columns: repeat(auto-fill, minmax(260px, 1fr));
  gap: 1rem;
  padding: 2rem 0;
}

.fcard {
  padding: 1.5rem;
  background: rgba(17, 24, 39, 0.9);
  border: 1px solid var(--border);
  border-radius: 12px;
  cursor: pointer;
  transition: var(--transition);
  text-align: left;
  font-family: var(--font-main);
}
.fcard:hover {
  border-color: var(--accent);
  background: var(--bg-card-hover);
  transform: translateY(-2px);
  box-shadow: 0 8px 30px rgba(0,0,0,0.4);
}
.fcard-meta { font-size: 0.65rem; color: var(--text-muted); letter-spacing: 0.15em; margin-bottom: 0.5rem; }
.fcard-quote { font-size: 0.9rem; color: var(--text-primary); font-weight: 500; line-height: 1.5; margin-bottom: 0.8rem; }
.fcard-ref { font-size: 0.75rem; color: var(--text-muted); display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; overflow: hidden; }

#cards-close {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  background: rgba(17,24,39,0.9);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 1.2rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  z-index: 501;
}
#cards-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* Card modal */
#card-modal {
  position: fixed;
  inset: 0;
  z-index: 600;
  background: rgba(10,13,20,0.97);
  display: none;
  align-items: center;
  justify-content: center;
  padding: 2rem;
}
#card-modal.open { display: flex; }
.card-modal-content {
  max-width: 600px;
  width: 100%;
  max-height: 80vh;
  overflow-y: auto;
  padding: 2.5rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 16px;
  text-align: left;
}
.card-modal-content::-webkit-scrollbar { width: 4px; }
.card-modal-content::-webkit-scrollbar-thumb { background: var(--border); border-radius: 4px; }
.card-modal-quote { font-size: 1.2rem; color: var(--text-primary); font-weight: 500; line-height: 1.7; margin-bottom: 1.5rem; }
.card-modal-text { font-size: 0.9rem; color: var(--text-secondary); line-height: 2; white-space: pre-line; }
#card-modal-close { margin-top: 2rem; background: var(--accent); border: none; color: #fff; font-size: 0.85rem; padding: 0.6em 1.5em; border-radius: 20px; cursor: pointer; transition: var(--transition); font-family: var(--font-main); }
#card-modal-close:hover { box-shadow: 0 0 20px var(--accent-glow); }

/* ==================== SEARCH ==================== */
#search-overlay {
  position: fixed;
  inset: 0;
  z-index: 500;
  background: rgba(10,13,20,0.97);
  display: none;
  align-items: flex-start;
  justify-content: center;
  padding-top: 15vh;
}
#search-overlay.open { display: flex; }
#search-input-wrap {
  width: 100%;
  max-width: 560px;
  padding: 0 1.5rem;
}
#search-input {
  width: 100%;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 12px;
  padding: 1rem 1.2rem;
  font-size: 1rem;
  color: var(--text-primary);
  font-family: var(--font-main);
  outline: none;
  transition: var(--transition);
}
#search-input:focus { border-color: var(--accent); box-shadow: 0 0 20px var(--accent-glow); }
#search-results { margin-top: 1rem; }
.sr-item {
  padding: 1rem 1.2rem;
  background: var(--bg-card);
  border: 1px solid var(--border);
  border-radius: 10px;
  margin-bottom: 0.5rem;
  cursor: pointer;
  transition: var(--transition);
  font-size: 0.85rem;
  color: var(--text-secondary);
  line-height: 1.6;
}
.sr-item:hover { border-color: var(--accent); background: var(--bg-card-hover); }
.sr-item mark { background: rgba(107,140,206,0.3); color: var(--accent); border-radius: 2px; padding: 0 2px; }
#search-close {
  position: fixed;
  top: 1.5rem;
  right: 1.5rem;
  background: rgba(17,24,39,0.9);
  border: 1px solid var(--border);
  color: var(--text-secondary);
  font-size: 1.2rem;
  width: 44px;
  height: 44px;
  border-radius: 50%;
  cursor: pointer;
  transition: var(--transition);
  z-index: 501;
}
#search-close:hover { background: var(--bg-card-hover); color: var(--text-primary); }

/* ==================== NAV ==================== */
.nav-hint {
  position: fixed;
  bottom: 2rem;
  left: 50%;
  transform: translateX(-50%);
  z-index: 100;
  display: flex;
  gap: 1rem;
  opacity: 0;
  transition: opacity 0.6s;
  pointer-events: none;
}
.nav-hint.visible { opacity: 1; pointer-events: auto; }
.nav-btn {
  width: 44px;
  height: 44px;
  border-radius: 50%;
  border: 1px solid var(--border);
  background: rgba(17,24,39,0.8);
  color: var(--text-secondary);
  font-size: 1.2rem;
  cursor: pointer;
  transition: var(--transition);
  display: flex;
  align-items: center;
  justify-content: center;
}
.nav-btn:hover { background: var(--bg-card-hover); border-color: var(--accent); color: var(--accent); }
.nav-btn:disabled { opacity: 0.3; cursor: default; }

/* ==================== PRINT ==================== */
@media print {
  #topbar, .nav-hint, #cards-overlay, #search-overlay, #card-modal, .nav-hint { display: none !important; }
  .page { position: static; height: auto; padding: 2rem; }
  .page-inner { max-height: none; overflow: visible; box-shadow: none; border: none; background: white; color: black; }
}

/* ==================== RESPONSIVE ==================== */
@media (max-width: 640px) {
  .page-inner { padding: 2rem 1.5rem; }
  #topbar { padding: 0 1rem; }
  .cards-wall { grid-template-columns: 1fr; }
}
</style>
</head>
<body>

<canvas id="star-canvas"></canvas>

<!-- Cover -->
<div id="cover">
  <div class="cover-title">我的奥德赛时期</div>
  <div class="cover-subtitle">一段漂泊与归途的记录</div>
  <button class="cover-enter" onclick="enterBook()">进入奥德赛</button>
  <div class="cover-waves">
    <svg viewBox="0 0 1440 200" preserveAspectRatio="none">
      <path fill="rgba(107,140,206,0.15)" d="M0,100 C360,160 720,40 1080,100 C1260,130 1380,100 1440,100 L1440,200 L0,200 Z">
        <animate attributeName="d" dur="8s" repeatCount="indefinite"
          values="M0,100 C360,160 720,40 1080,100 C1260,130 1380,100 1440,100 L1440,200 L0,200 Z;
                  M0,100 C360,40 720,160 1080,100 C1260,70 1380,100 1440,100 L1440,200 L0,200 Z;
                  M0,100 C360,160 720,40 1080,100 C1260,130 1380,100 1440,100 L1440,200 L0,200 Z"/>
      </path>
      <path fill="rgba(107,140,206,0.08)" d="M0,120 C480,80 960,160 1440,120 L1440,200 L0,200 Z">
        <animate attributeName="d" dur="12s" repeatCount="indefinite"
          values="M0,120 C480,80 960,160 1440,120 L1440,200 L0,200 Z;
                  M0,120 C480,160 960,80 1440,120 L1440,200 L0,200 Z;
                  M0,120 C480,80 960,160 1440,120 L1440,200 L0,200 Z"/>
      </path>
    </svg>
  </div>
</div>

<!-- Top bar -->
<div id="topbar">
  <div id="progress-bar">
    <span id="page-label">封面</span>
    <div id="progress-dots"></div>
  </div>
  <div style="display:flex;gap:0.5rem;">
    <button class="top-btn" onclick="openCards()" title="慢慢想明白的事">✦</button>
    <button class="top-btn" onclick="openSearch()" title="搜索">⌕</button>
    <button class="top-btn" onclick="window.print()" title="打印">⎙</button>
  </div>
</div>

<!-- Book -->
<div id="book"></div>

<!-- Floating cards wall -->
<div id="cards-overlay">
  <button id="cards-close" onclick="closeCards()">✕</button>
  <div class="cards-wall" id="cards-wall"></div>
</div>

<!-- Card modal -->
<div id="card-modal">
  <div class="card-modal-content" id="card-modal-content">
    <div class="card-modal-quote" id="card-modal-quote"></div>
    <div class="card-modal-text" id="card-modal-text"></div>
    <button id="card-modal-close" onclick="closeCardModal()">关闭</button>
  </div>
</div>

<!-- Search -->
<div id="search-overlay">
  <button id="search-close" onclick="closeSearch()">✕</button>
  <div id="search-input-wrap">
    <input id="search-input" placeholder="搜索..." oninput="doSearch(this.value)" autofocus>
    <div id="search-results"></div>
  </div>
</div>

<!-- Nav -->
<div class="nav-hint" id="nav-hint">
  <button class="nav-btn" id="prev-btn" onclick="prevPage()">←</button>
  <button class="nav-btn" id="next-btn" onclick="nextPage()">→</button>
</div>

<script>
// ===== STAR FIELD =====
const starCanvas = document.getElementById('star-canvas');
const sctx = starCanvas.getContext('2d');
let stars = [];

function initStars() {
  starCanvas.width = window.innerWidth;
  starCanvas.height = window.innerHeight;
  stars = [];
  for (let i = 0; i < 200; i++) {
    stars.push({
      x: Math.random() * starCanvas.width,
      y: Math.random() * starCanvas.height,
      r: Math.random() * 1.5,
      o: Math.random(),
      speed: 0.002 + Math.random() * 0.005,
      phase: Math.random() * Math.PI * 2
    });
  }
}

function drawStars(t) {
  sctx.clearRect(0, 0, starCanvas.width, starCanvas.height);
  stars.forEach(s => {
    sctx.beginPath();
    sctx.arc(s.x, s.y, s.r, 0, Math.PI * 2);
    sctx.fillStyle = `rgba(255,255,255,${Math.abs(Math.sin(t * s.speed + s.phase))})`;
    sctx.fill();
  });
}

function animateStars(t) { drawStars(t); requestAnimationFrame(animateStars); }
initStars();
window.addEventListener('resize', initStars);
animateStars(0);

// ===== PAGES DATA =====
const pages = [
  {
    label: '封面',
    content: `
      <div style="text-align:center;padding:1rem 0;">
        <div style="font-size:0.75rem;letter-spacing:0.25em;color:var(--text-muted);margin-bottom:1rem;">2026年4月28日</div>
        <h1 style="font-size:1.8rem;font-weight:300;letter-spacing:0.15em;color:var(--text-primary);margin-bottom:0.5rem;">我的奥德赛时期</h1>
        <div style="font-size:0.8rem;color:var(--text-secondary);letter-spacing:0.3em;">一段漂泊与归途的记录</div>
        <div style="margin-top:2.5rem;padding:1.5rem;background:rgba(107,140,206,0.05);border:1px solid var(--border);border-radius:10px;">
          <div style="font-size:0.95rem;color:var(--text-primary);line-height:2;font-weight:500;">
            "这次落地的，已经是一个和上次不一样的你了。"
          </div>
        </div>
        <div style="margin-top:1rem;padding:1.5rem;background:rgba(107,140,206,0.03);border:1px solid var(--border);border-radius:10px;">
          <div style="font-size:0.88rem;color:var(--text-secondary);line-height:2;font-style:italic;">
            "奥德修斯航行了十年才到家，<br>我也要走好自己的那段路。"
          </div>
        </div>
      </div>
    `
  },
  {
    label: '写在开始',
    content: `
      <div class="entry-date">INTRO</div>
      <div class="entry-title">写在开始</div>
      <div class="entry-body">每个人都有属于自己的奥德赛时期——那是一段看似在迷路、却其实正在找自己的日子。没有确定的目的地，没有清晰的地图，只有风、浪、和一艘不愿靠岸的船。</div>
      <div class="entry-body">这份记录，是我给自己的一份温柔的档案。不是为了谁看，只为在未来某一天回望时，能对当下的自己说一声："你看，你真的走过来了。"</div>
      <div class="entry-body">从今天起，我会每天记录一点点——可能是一个瞬间、一种心情、一件小事、一个想通的道理。日子堆起来，就是答案。</div>
      <div class="entry-divider">— ✦ —</div>
    `
  },
  {
    label: '4月28日',
    content: `
      <div class="entry-date">2026年4月28日 · 周二</div>
      <div class="entry-title">每日记录</div>

      <div class="entry-section-label">【今日心境】</div>
      <div class="entry-body">今天到目前为止都比较平静，但平静下面藏着一点紧张——马上要需求评审了。紧张是真的，但好像也没到慌的地步。像是暴风雨前那种把一切都摊开来等一等的感觉。</div>

// ===== BOOK LOGIC =====
let currentPage = 0;
const book = document.getElementById('book');
const dotsEl = document.getElementById('progress-dots');
const labelEl = document.getElementById('page-label');
const navHint = document.getElementById('nav-hint');
const prevBtn = document.getElementById('prev-btn');
const nextBtn = document.getElementById('next-btn');

function buildDots() {
  dotsEl.innerHTML = '';
  pages.forEach((_, i) => {
    const d = document.createElement('div');
    d.className = 'pdot';
    if (i === 0) d.classList.add('active');
    else if (i < currentPage) d.classList.add('done');
    dotsEl.appendChild(d);
  });
}

function renderPage(idx, dir) {
  const existing = book.querySelector('.page');
  if (existing) existing.remove();

  const p = document.createElement('div');
  p.className = 'page page-enter';
  p.innerHTML = `<div class="page-inner">${pages[idx].content}</div>`;
  book.appendChild(p);

  labelEl.textContent = pages[idx].label;
  buildDots();
  prevBtn.disabled = idx === 0;
  nextBtn.disabled = idx === pages.length - 1;
  currentPage = idx;
}

function enterBook() {
  document.getElementById('cover').classList.add('fade-out');
  document.getElementById('topbar').classList.add('visible');
  navHint.classList.add('visible');
  setTimeout(() => {
    document.getElementById('cover').style.display = 'none';
    renderPage(1);
  }, 1500);
}

function goPage(n) {
  if (n < 0 || n >= pages.length) return;
  const existing = book.querySelector('.page');
  if (existing) existing.classList.add('page-exit');
  setTimeout(() => renderPage(n), 300);
}

function prevPage() { goPage(currentPage - 1); }
function nextPage() { goPage(currentPage + 1); }

document.addEventListener('keydown', e => {
  if (e.key === 'ArrowRight' || e.key === ' ') { e.preventDefault(); nextPage(); }
  if (e.key === 'ArrowLeft') { e.preventDefault(); prevPage(); }
});

let touchStartX = 0;
document.addEventListener('touchstart', e => { touchStartX = e.touches[0].clientX; });
document.addEventListener('touchend', e => {
  const dx = touchStartX - e.changedTouches[0].clientX;
  if (Math.abs(dx) > 60) { if (dx > 0) nextPage(); else prevPage(); }
});

// ===== CARDS =====
function buildCards() {
  const wall = document.getElementById('cards-wall');
  wall.innerHTML = '';
  insights.forEach((c, i) => {
    const card = document.createElement('div');
    card.className = 'fcard';
    card.innerHTML = `<div class="fcard-meta">${c.meta}</div><div class="fcard-quote">${c.quote}</div><div class="fcard-ref">${c.text.substring(0, 60)}...</div>`;
    card.onclick = () => openCard(i);
    wall.appendChild(card);
  });
}

function openCards() {
  buildCards();
  document.getElementById('cards-overlay').classList.add('open');
}
function closeCards() { document.getElementById('cards-overlay').classList.remove('open'); }
function openCard(i) {
  const c = insights[i];
  document.getElementById('card-modal-quote').textContent = c.quote;
  document.getElementById('card-modal-text').textContent = c.text;
  document.getElementById('card-modal').classList.add('open');
}
function closeCardModal() { document.getElementById('card-modal').classList.remove('open'); }

// ===== SEARCH =====
const allText = pages.map(p => p.content.replace(/<[^>]+>/g, '')).join('\n');

function doSearch(q) {
  const res = document.getElementById('search-results');
  if (!q.trim()) { res.innerHTML = ''; return; }
  const escaped = q.replace(/[.*+?^${}()|[\]\\]/g, '\\$&');
  const re = new RegExp(escaped, 'gi');
  const matches = [...allText.matchAll(new RegExp(escaped, 'gi'))];
  let html = '';
  if (matches.length === 0) {
    html = '<div style="color:var(--text-muted);text-align:center;padding:1rem;">没有找到相关内容</div>';
  } else {
    const idx = matches[0].index;
    const start = Math.max(0, idx - 40);
    const end = Math.min(allText.length, idx + 100);
    let snippet = allText.substring(start, end).replace(re, m => `<mark>${m}</mark>`);
    if (start > 0) snippet = '...' + snippet;
    if (end < allText.length) snippet = snippet + '...';
    html = `<div class="sr-item">${snippet}</div>`;
  }
  res.innerHTML = html;
}

function openSearch() { document.getElementById('search-overlay').classList.add('open'); document.getElementById('search-input').focus(); }
function closeSearch() { document.getElementById('search-overlay').classList.remove('open'); document.getElementById('search-input').value = ''; document.getElementById('search-results').innerHTML = ''; }
document.getElementById('search-input').addEventListener('keydown', e => { if (e.key === 'Escape') closeSearch(); });
